name: Deploy to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: ${{ secrets.SERVER_HOST }}

      - name: Deploy vocaltune through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # 首次建置需安裝並匯出 PyTorch/CUDA/Demucs 大型 image；
          # 預設 SSH command timeout 會在 image exporting 階段提早中止。
          command_timeout: 30m
          script: |
            /home/ricky/deployments/scripts/deploy-app.sh vocaltune
