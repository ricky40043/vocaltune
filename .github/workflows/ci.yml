name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 後端有 torch/demucs 等重量級 ML 套件，full install 太慢；
      # 這裡只做語法檢查（compile），抓語法錯就好。
      - name: Syntax check (compileall, 排除任何 venv)
        run: python -m compileall backend-api -x 'venv'
      - name: Media duration policy tests
        run: PYTHONPATH=backend-api python -m unittest backend-api/test_media_policy.py -v
      - name: Separation history recovery tests
        run: PYTHONPATH=backend-api python -m unittest backend-api/test_history_tracks.py -v
      - name: Separation progress tests
        run: PYTHONPATH=backend-api python -m unittest backend-api/test_media_progress.py -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci || npm install
      - run: npm run build
