name: Complete PR14 on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  complete:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Apply fixes and verify build
        run: |
          python scripts/complete_pr14.py
          npm version 4.0.1 --no-git-tag-version
          npm ci
          npm run build

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App.tsx components/SongRequestSystem.tsx package.json package-lock.json
          git commit -m "fix: complete Studio picker and bump v4.0.1"
          git push origin HEAD:${{ github.head_ref }}
