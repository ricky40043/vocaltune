name: Complete PR14 on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Apply fixes and verify build
        run: |
          python scripts/complete_pr14.py
          npm version 4.0.1 --no-git-tag-version
          npm ci
          npm run build

      - name: Package verified files
        run: |
          mkdir -p verified/components
          cp App.tsx verified/App.tsx
          cp components/SongRequestSystem.tsx verified/components/SongRequestSystem.tsx
          cp package.json verified/package.json
          cp package-lock.json verified/package-lock.json

      - uses: actions/upload-artifact@v4
        with:
          name: verified-pr14-files
          path: verified
