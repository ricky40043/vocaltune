name: Apply v4.0.4 changes

on:
  push:
    branches:
      - feat/login-cleanup-karaoke-v4.0.4

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/login-cleanup-karaoke-v4.0.4
          fetch-depth: 0

      - name: Apply changes and test
        run: |
          python scripts/apply_v4_0_4.py
          python -m py_compile backend-api/main.py
          npm ci
          npm run build

      - name: Commit generated changes
        run: |
          rm -f scripts/apply_v4_0_4.py .github/workflows/apply-v4-0-4.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add App.tsx package.json package-lock.json backend-api/main.py scripts/apply_v4_0_4.py .github/workflows/apply-v4-0-4.yml
          git commit -m "feat: remove guest mode and add daily cleanup v4.0.4"
          git push origin HEAD:feat/login-cleanup-karaoke-v4.0.4
