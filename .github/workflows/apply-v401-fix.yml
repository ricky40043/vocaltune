name: Apply VocalTune v4.0.1 fix

on:
  push:
    branches:
      - fix/pr14-complete-v4.0.1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pr14-complete-v4.0.1
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply source changes
        run: python3 scripts/apply_v401_fix.py

      - name: Verify build
        run: |
          npm ci
          npm run build

      - name: Commit verified changes
        run: |
          rm -f .github/workflows/apply-v401-fix.yml scripts/apply_v401_fix.py .trigger-v401-fix
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: complete Studio song picker and release v4.0.1"
          git push origin HEAD:fix/pr14-complete-v4.0.1
