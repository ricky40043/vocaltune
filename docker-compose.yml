version: '3.8'

services:
  vocal-studio:
    build: .
    container_name: vocal-studio
    env_file:
      - .env
    environment:
      ADMIN_MODE_PASSWORD: "go for it"
    ports:
      - "18300:8080"
    volumes:
      # Persistent runtime storage outside the Git checkout.
      - ${VOCALTUNE_DATA_DIR:-/srv/vocaltune}/downloads:/app/backend-api/downloads
      - ${VOCALTUNE_DATA_DIR:-/srv/vocaltune}/separated:/app/backend-api/separated
      - ${VOCALTUNE_DATA_DIR:-/srv/vocaltune}/karaoke_output:/app/backend-api/karaoke_output
      - ${VOCALTUNE_DATA_DIR:-/srv/vocaltune}/db_data:/app/backend-api/db_data
    restart: unless-stopped
    # Optional CPU limit to keep your PC smooth
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 4G
